name: test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  check-format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "28"
          gleam-version: "1.15.4"
          rebar3-version: "3"
      - run: gleam deps download
      - run: gleam format --check src test

  test-erlang:
    name: Erlang (OTP ${{ matrix.otp-version }}, Gleam ${{ matrix.gleam-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        otp-version: ["27", "28"]
        gleam-version: ["1.14.0", "1.15.4"]
    steps:
      - uses: actions/checkout@v6
      - uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ matrix.otp-version }}
          gleam-version: ${{ matrix.gleam-version }}
          rebar3-version: "3"
      - run: gleam deps download
      - run: gleam test --target erlang

  test-javascript:
    name: JavaScript (Node ${{ matrix.node-version }}, Gleam ${{ matrix.gleam-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["22", "24"]
        gleam-version: ["1.14.0", "1.15.4"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "28"
          gleam-version: ${{ matrix.gleam-version }}
          rebar3-version: "3"
      - run: gleam deps download
      - run: gleam test --target javascript
